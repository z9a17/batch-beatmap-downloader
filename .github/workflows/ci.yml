name: Client checks

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  windows-client:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: client

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build Windows installer
        run: npm run make:win

      - name: Smoke-test packaged renderer
        run: npm run smoke:win

      - name: Smoke-test osu!lazer library reader
        run: npm run smoke:lazer-reader:win

      - name: Install and smoke-test NSIS application
        run: npm run smoke:installer:win
