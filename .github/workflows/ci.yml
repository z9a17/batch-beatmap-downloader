name: Client checks

on:
  push:
    branches:
      - main
      - "agent/**"
  pull_request:

permissions:
  contents: read

jobs:
  windows-client:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: client

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build Windows installer
        run: npm run make:win

      - name: Smoke-test packaged renderer
        run: npm run smoke:win

      - name: Verify NSIS artifact
        shell: pwsh
        run: |
          $installer = Get-ChildItem out/make -Filter "BBDCommunity-Setup-*.exe" -File
          if ($installer.Count -ne 1) {
            throw "Expected exactly one versioned NSIS installer, found $($installer.Count)."
          }
