name: Build release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  windows-installer:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: client

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: |
          npm run typecheck
          npm run lint

      - name: Build Windows installer
        run: npm run make:win

      - name: Smoke-test packaged renderer
        run: npm run smoke:win

      - name: Smoke-test osu!lazer library reader
        run: npm run smoke:lazer-reader:win

      - name: Install and smoke-test NSIS application
        run: npm run smoke:installer:win

      - name: Verify NSIS release files
        shell: pwsh
        run: |
          $installer = Get-ChildItem out/make -Filter "BBDCommunity-Setup-*.exe" -File
          $metadata = Get-ChildItem out/make -Filter "*.yml" -File
          if ($installer.Count -ne 1) {
            throw "Expected exactly one versioned NSIS installer, found $($installer.Count)."
          }
          if ($metadata.Count -lt 1) {
            throw "Expected electron-updater metadata beside the installer."
          }

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: bbd-community-windows-${{ github.ref_name }}
          path: client/out/make/**
          if-no-files-found: error
